label: The Vision
towerBody: >-
  52 waterfront residences on Biscayne Bay, Edgewater, Miami. A tower cut to
  the shoreline, drawn from the morning light, set at the height a building
  should sit when the water is the thing it answers to.
cardCopy:
  - >-
    Aurea Residences delivers private waterfront homes in Edgewater, Miami —
    three-bedroom, four-bedroom, and full-floor penthouse residences from the
    12th to the 52nd floor, each with direct bay views and wraparound terraces.
  - >-
    Twelve-foot ceilings. Floors that hold the warmth of the sun until evening.
    Floor-to-ceiling glass opens every residence to the breeze off the water.
    Each room is drawn around the view it was built to frame.
  - >-
    The terrace is where the thinking happens. The bay is how you tell the
    time. The day ends with the pool level with the horizon, and nothing
    between you and the sky.
