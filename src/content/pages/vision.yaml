label: The Vision
towerBody: >-
  A tower that belongs to the bay before it belongs to anyone. 52 storeys cut
  to the shoreline, drawn from the morning light, set at the height a building
  should sit when the water is the thing it answers to.
cardCopy:
  - >-
    Aurea is a private waterfront residence in Edgewater, Miami. Bare feet on
    warm stone at first light. The bay still glass. Coffee on a terrace deep
    enough to live on, before the city has decided what kind of day it is.
  - >-
    Twelve-foot ceilings. Floors that hold the warmth of the sun until evening.
    Glass that opens the whole flat to the breeze off the water. Every room
    drawn around the view it was meant to frame.
  - >-
    The terrace is where the thinking happens. The bay is how you tell the
    time. The day ends with the pool level with the horizon, and nothing
    between you and the sky.
