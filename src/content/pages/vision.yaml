label: The Vision
towerBody: >-
  A tower that belongs to its shoreline. 52 storeys shaped by the bay, the
  morning light, and the idea that a building should feel as calm as the water
  it overlooks.
cardCopy:
  - >-
    Aurea is a waterfront residence for the life you keep coming back to.
    Morning light on the bay from a deep terrace. Cold water and warm stone
    before the day starts. An evening where the pool sits level with the
    horizon and you stop counting the hours.
  - >-
    These are quiet rooms shaped by the water outside them. Designed around
    sunrise, open to the breeze, finished in materials that feel warm underfoot
    and cool to the touch.
  - >-
    You settle into them slowly, then all at once. The terrace becomes where
    you think. The view becomes how you tell the time. A home designed to
    become, over time, the place that makes everything else work.
