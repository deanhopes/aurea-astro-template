description: >-
  Biscayne Bay is the front garden. Paddleboard at dawn before the wind comes
  up. Kayak across to Monument Island. Watch dolphins break the surface at
  golden hour. The Venetian Islands sit in the middle distance. Miami Beach
  beyond. A view that rewards the second look more than the first.
